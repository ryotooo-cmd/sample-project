<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Todo List</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; }
    li { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    li span { flex: 1; }
    li.done span { text-decoration: line-through; color: #999; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] { flex: 1; padding: 6px; }
    button { padding: 6px 12px; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <form id="add-form">
    <input type="text" id="title" placeholder="New todo" required>
    <button type="submit">Add</button>
  </form>
  <ul id="todo-list"></ul>

  <script>
    const list = document.getElementById('todo-list');
    const form = document.getElementById('add-form');
    const titleInput = document.getElementById('title');

    async function loadTodos() {
      const res = await fetch('/todos');
      const todos = await res.json();
      list.innerHTML = '';
      for (const todo of todos) {
        const li = document.createElement('li');
        li.className = todo.done ? 'done' : '';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => toggleDone(todo.id, checkbox.checked));

        const span = document.createElement('span');
        span.textContent = todo.title;

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

        li.append(checkbox, span, deleteBtn);
        list.appendChild(li);
      }
    }

    async function toggleDone(id, done) {
      await fetch(`/todos/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done }),
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = titleInput.value.trim();
      if (!title) return;
      await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title }),
      });
      titleInput.value = '';
      loadTodos();
    });

    loadTodos();
  </script>
</body>
</html>
